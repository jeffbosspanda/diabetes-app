# Render Blueprint — DiaGuide
# 一鍵部署：到 Render 連 GitHub repo，Render 會自動讀此檔建立服務。
services:
  - type: web
    name: diaguide
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/libre/health
    envVars:
      # 在 Render Dashboard 手動填入，勿寫進此檔（避免外洩）
      - key: ANTHROPIC_API_KEY
        sync: false
      # 食物辨識端點的共用通關金鑰（自訂一組長字串）
      - key: ACCESS_KEY
        sync: false
      # Supabase（登入 + 雲端儲存）。build 時注入前端，故必填。
      # anon key 可公開（資料靠 RLS 保護）。
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # 伺服器排程同步用（後端執行時讀取，勿外洩）：
      # SUPABASE_URL = 同 VITE_SUPABASE_URL 的專案網址
      # SUPABASE_SERVICE_ROLE_KEY = Supabase service_role 金鑰（繞過 RLS，機密！）
      # CRON_SECRET = 自訂長字串，保護 /api/cron/sync-all 端點
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      # Web Push（手機推播）。用 `npx web-push generate-vapid-keys` 產生一組：
      # VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY；VAPID_SUBJECT 為 mailto: 聯絡信箱。
      # 公鑰可公開（前端訂閱用），私鑰機密勿外洩。
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
